name: Weather BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke tests
        run: behave --no-capture --tags=smoke

  regression:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regression tests
        run: behave --no-capture --tags=regression -f html -o reports/report.html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: behave-report
          path: reports/report.html